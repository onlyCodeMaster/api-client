version: 2

# Dependabot keeps three ecosystems up to date on a weekly cadence. PRs are
# limited per ecosystem so a single noisy week can't drown the queue, and
# patch/minor updates are grouped together so we don't get N tiny PRs when
# a transitive dep bumps across the tree.
#
# Major bumps stay un-grouped because they may need code changes; we want
# them as standalone PRs so the diff and CI signal are isolated.
updates:
  # ---- JavaScript / TypeScript ---------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- Rust / Cargo (Tauri backend) ----------------------------------------
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---- GitHub Actions versions ---------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
