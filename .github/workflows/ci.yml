name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit arrives on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript / ESLint / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (cargo check / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        # Tauri pulls in webkit2gtk and friends; they're not on the runner
        # image by default. Match the versions our repo blueprint installs.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --no-deps -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --locked

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # E2E runs the React UI against a mocked Tauri IPC layer (see
    # src/utils/e2eMockTauri.ts). It does NOT exercise the Rust backend
    # or the real Tauri shell — that's deliberate: building the Tauri
    # binary on every PR is too slow for a useful pre-merge signal, and
    # the backend has its own `cargo test --lib` coverage.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  security:
    name: Security audit (cargo audit / npm audit)
    runs-on: ubuntu-latest
    # Security scans should never block a feature PR by themselves — a new
    # CVE in a transitive dep can land mid-flight without any change on our
    # side. We still want a visible signal, so the job runs on every PR but
    # never marks the run red: failures show up as ⚠️ warnings instead.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # ---- Rust side ------------------------------------------------------
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Install cargo-audit ignore list
        # `cargo-audit` only reads `~/.cargo/audit.toml` (no project-local
        # config path is supported). We keep the canonical file inside
        # `src-tauri/` so it lives near the code and contributors can find
        # it; this step copies it into the cargo-home location before the
        # scan. See `src-tauri/audit.toml` for the rationale per ignored ID.
        run: |
          mkdir -p ~/.cargo
          cp src-tauri/audit.toml ~/.cargo/audit.toml

      - name: cargo audit
        working-directory: src-tauri
        # `--deny warnings` turns unmaintained / yanked notices into hard
        # failures too. Advisories we can't act on (transitive deps deep
        # in the Tauri Linux WebView stack) are listed in
        # `src-tauri/audit.toml` with a comment per entry; remove them
        # when Tauri / wry bumps and drops the affected crate.
        run: cargo audit --deny warnings

      # ---- JavaScript side ------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, high+ severity)
        # Devtime deps (vite, eslint, playwright, …) frequently carry
        # advisories that don't apply to a published Tauri app, so we
        # restrict to runtime deps and ignore moderate/low signal.
        run: npm audit --omit=dev --audit-level=high
