name: Release

on:
  # Manual dispatch lets maintainers trigger a release build from any
  # branch without having to push a tag. Pushing a `v*` tag (e.g.
  # `v0.2.0`) also triggers a real release.
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os-name: macOS (Universal), runner: macos-latest, args: "--target universal-apple-darwin" }
          - { os-name: Linux (x86_64),    runner: ubuntu-latest, args: "" }
          - { os-name: Windows (x86_64),  runner: windows-latest, args: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.runner == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: matrix.platform.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      # Use the official Tauri action so we get bundling + signing +
      # automatic GitHub Release attachment for free.
      - name: Build & publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "api-client ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}
